<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Canción latina/Juego de parejas</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <div class="app">

  <div id="overlay" class="overlay overlay-loading">
    <div class="overlay-card" id="overlayCard">
      <div class="overlay-kicker" id="overlayKicker"></div>
      <h2 class="overlay-title" id="overlayTitle">Cargando…</h2>
      <div class="overlay-text" id="overlayText"></div>
      <button id="overlayButton" class="overlay-button" type="button" hidden>Comenzar</button>
    </div>
  </div>

    <!-- CABECERA -->
    <header class="header">
      <h1>Juego de parejas</h1>
      <div class="hud" id="hud"></div>
    </header>
    
    <!-- FILA SUPERIOR -->
    <section class="row row-top">
      <div id="topRow" class="cards"></div>
    </section>

    <!-- FILA INFERIOR -->
    <section class="row row-bottom">
      <div id="bottomRow" class="cards"></div>
    </section>

  </div>

  <!-- LIBRERÍA CSV -->
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

  <!-- LÓGICA -->
  <script src="script.js"></script>

</body>
</html>
